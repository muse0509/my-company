name: X Auto Post

on:
  schedule:
    # 投稿時刻をcronで設定（例: JST 1:30, 3:00, 5:00, 7:00）
    # JST 1:30 = UTC 16:30 (前日)
    - cron: '30 16 * * *'  # JST 1:30
    - cron: '0 18 * * *'   # JST 3:00
    - cron: '0 20 * * *'   # JST 5:00
    - cron: '0 22 * * *'   # JST 7:00
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install twitter-api-v2
      
      - name: Determine which post to send
        id: post
        run: |
          # 現在時刻に応じて投稿を選択
          HOUR=$(date -u +%H)
          case $HOUR in
            16) POST_FILE="01-30" ;;
            18) POST_FILE="03-00" ;;
            20) POST_FILE="05-00" ;;
            22) POST_FILE="07-00" ;;
            *) echo "No post scheduled for this hour"; exit 0 ;;
          esac
          
          POST_PATH=".company/marketing/scheduled-posts/$(date +%Y-%m-%d)/${POST_FILE}.txt"
          
          if [ -f "$POST_PATH" ]; then
            echo "post_text<<EOF" >> $GITHUB_OUTPUT
            cat "$POST_PATH" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "Post file not found: $POST_PATH"
            exit 1
          fi
      
      - name: Post to X (Twitter)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          node .company/marketing/scripts/post-to-x.js "${{ steps.post.outputs.post_text }}"
      
      - name: Log posted tweet
        run: |
          echo "$(date): Posted tweet" >> .company/marketing/data/post-log.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .company/marketing/data/post-log.txt
          git commit -m "📤 Posted tweet: $(date)" || echo "No changes"
          git push
