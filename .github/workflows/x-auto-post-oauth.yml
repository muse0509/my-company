name: X Auto Post (OAuth)

on:
  schedule:
    # 今日の日中投稿（JST）
    - cron: '0 2 * * *'   # JST 11:00
    - cron: '0 5 * * *'   # JST 14:00
    - cron: '0 8 * * *'   # JST 17:00
    - cron: '0 11 * * *'  # JST 20:00
    - cron: '0 13 * * *'  # JST 22:00
    
    # 明日の深夜投稿（JST）
    - cron: '30 16 * * *' # JST 01:30
    - cron: '0 18 * * *'  # JST 03:00
    - cron: '0 20 * * *'  # JST 05:00
    - cron: '0 22 * * *'  # JST 07:00
  
  workflow_dispatch: # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd .company/marketing
          npm install twitter-api-v2
      
      - name: Post scheduled tweets
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          cd .company/marketing
          node scripts/post-scheduled-tweets.js
      
      - name: Log completion
        run: |
          echo "Posted at $(date)" >> .company/marketing/data/post-log.txt
          git config user.name "Alex (GitHub Actions)"
          git config user.email "actions@github.com"
          git add .company/marketing/data/post-log.txt
          git commit -m "📤 Auto-posted: $(date)" || echo "No changes"
          git push
