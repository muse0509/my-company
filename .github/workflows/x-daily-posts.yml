name: X Daily Posts Generation

on:
  schedule:
    # 毎朝 JST 7:00 (UTC 22:00 前日)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install @anthropic-ai/sdk
      
      - name: Fetch Axis traction data
        id: traction
        env:
          AXIS_STATS_API: ${{ secrets.AXIS_STATS_API }}
        run: |
          # Cloudflare Workers APIからトラクション取得（設定されている場合）
          if [ -n "$AXIS_STATS_API" ]; then
            echo "Fetching from Cloudflare Workers..."
            curl -s "$AXIS_STATS_API" > .company/marketing/data/current-traction.json
          else
            echo "Using mock traction data (AXIS_STATS_API not set)"
            echo '{"users": 127, "etfs": 8, "environment": "devnet", "updated_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > .company/marketing/data/current-traction.json
          fi
          cat .company/marketing/data/current-traction.json
      
      - name: Analyze past tweets
        run: |
          # 過去632件の投稿から高エンゲージメントパターンを抽出
          node .company/marketing/scripts/analyze-patterns.js
      
      - name: Generate daily posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Claude APIで投稿生成（実データ反映）
          node .company/marketing/scripts/generate-daily-posts.js
      
      - name: Save generated posts
        run: |
          # 生成した投稿をファイルに保存
          mkdir -p .company/marketing/scheduled-posts/$(date +%Y-%m-%d)
          mv daily-posts.json .company/marketing/scheduled-posts/$(date +%Y-%m-%d)/
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .company/marketing/
          git commit -m "🐦 Daily posts generated: $(date)" || echo "No changes"
          git push
      
      - name: Notify via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Telegramに通知
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="📱 Today's X posts generated! Check .company/marketing/scheduled-posts/"
