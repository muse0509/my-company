<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Protocol 資金調達ダッシュボード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-title {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .card-subtitle {
            font-size: 0.95em;
            color: #999;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 1s ease;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
            font-size: 0.9em;
        }
        .success {
            color: #28a745;
        }
        .warning {
            color: #ffc107;
        }
        .last-updated {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Axis Protocol</h1>
            <p>Pre-Seed 資金調達ダッシュボード</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">調達目標</div>
                <div class="card-value">$500K</div>
                <div class="card-subtitle">Pre-Seed Round</div>
            </div>

            <div class="card">
                <div class="card-title">調達済み</div>
                <div class="card-value success" id="raised">$35K</div>
                <div class="card-subtitle" id="percentage">7% 達成</div>
            </div>

            <div class="card">
                <div class="card-title">残り</div>
                <div class="card-value warning" id="remaining">$465K</div>
                <div class="card-subtitle" id="deadline">Deadline: 2026-06-30</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">進捗</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 7%">7%</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">活動統計</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="vc-contacts">0</div>
                    <div class="stat-label">VCコンタクト数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="emails-sent">0</div>
                    <div class="stat-label">Cold Email送信</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="reply-rate">0%</div>
                    <div class="stat-label">返信率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="meetings">0</div>
                    <div class="stat-label">ミーティング予定</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Alex ✨ | Axis Protocol | Solana DeFi</p>
        </div>

        <div class="last-updated" id="last-updated">
            最終更新: Loading...
        </div>
    </div>

    <script>
        // データ読み込み
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // 基本情報
                document.getElementById('raised').textContent = data.raised;
                document.getElementById('remaining').textContent = data.remaining;
                document.getElementById('percentage').textContent = data.percentage + ' 達成';
                
                // プログレスバー
                const progress = document.getElementById('progress');
                progress.style.width = data.percentage;
                progress.textContent = data.percentage;
                
                // 活動統計
                document.getElementById('vc-contacts').textContent = data.vcContacts || 0;
                document.getElementById('emails-sent').textContent = data.emailsSent || 0;
                document.getElementById('reply-rate').textContent = (data.replyRate || 0) + '%';
                document.getElementById('meetings').textContent = data.meetings || 0;
                
                // 最終更新時刻
                const lastUpdated = new Date(data.lastUpdated);
                document.getElementById('last-updated').textContent = 
                    `最終更新: ${lastUpdated.toLocaleString('ja-JP')}`;
                    
            } catch (error) {
                console.error('データ読み込みエラー:', error);
            }
        }
        
        // ページ読み込み時とページ表示時に実行
        loadData();
        
        // 5分ごとに自動更新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
